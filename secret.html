<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="View your one-time encrypted secret." />
  <!-- Prevent search engines from indexing secret view pages -->
  <meta name="robots" content="noindex, nofollow" />
  <title>VaultLink — View Secret</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* Extra styles specific to the view page loading state */
    .loading-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.25rem;
      padding: 3rem 0;
      color: var(--text-muted);
      font-size: 0.8rem;
      letter-spacing: 0.1em;
    }

    .loading-ring {
      width: 48px; height: 48px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* View page specific nav */
    .view-nav {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 0 0;
    }

    .view-nav-logo {
      display: flex; align-items: center; gap: 8px;
      text-decoration: none;
      color: var(--text);
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 300;
    }

    .view-nav-logo span { color: var(--accent); font-weight: 700; }

    .view-nav-logo svg {
      width: 22px; height: 22px;
      color: var(--accent);
      filter: drop-shadow(0 0 5px var(--accent-mid));
    }

    .one-time-badge {
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--danger);
      border: 1px solid rgba(255,91,107,0.3);
      background: rgba(255,91,107,0.07);
      padding: 0.3rem 0.6rem;
      border-radius: 4px;
    }
  </style>
</head>
<body>

  <div class="page-wrapper">

    <!-- Minimal nav bar -->
    <nav class="view-nav fade-in" aria-label="Site navigation">
      <a href="index.html" class="view-nav-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" aria-hidden="true">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          <path d="M9 12l2 2 4-4"/>
        </svg>
        Vault<span>Link</span>
      </a>
      <span class="one-time-badge" aria-label="One-time view secret">⚡ One-Time View</span>
    </nav>

    <!-- ── STATE CONTAINER ──────────────────────────────────── -->
    <!--
      JavaScript will replace the contents of this element based on the
      outcome of the decryption attempt. Possible states:
        - Loading (default)
        - success: secret decrypted and revealed
        - error:   secret not found / link broken
        - expired: past expiration time
    -->
    <div id="view-state" class="state-card" role="main" aria-live="polite">
      <!-- Initial loading state — replaced by JS immediately -->
      <div class="loading-wrap">
        <div class="loading-ring" aria-hidden="true"></div>
        <span>Decrypting secret…</span>
      </div>
    </div>

    <footer class="site-footer" style="margin-top:auto">
      VaultLink · All decryption happens locally · No data transmitted
    </footer>

  </div><!-- .page-wrapper -->

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="crypto.js"></script>
  <script src="script.js"></script>
</body>
</html>
